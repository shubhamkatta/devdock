<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <!-- Background grid dots (PCB substrate) -->
  <defs>
    <pattern id="grid-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#0d1117" opacity="0.04"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="800" height="320" fill="url(#grid-dots)"/>

  <!-- ============================================ -->
  <!-- CENTER HUB: Outer hexagon                    -->
  <!-- ============================================ -->
  <polygon
    points="400,70 448,87 448,133 400,150 352,133 352,87"
    fill="none"
    stroke="#0d1117"
    stroke-width="2"
    opacity="0.9"
  />
  <!-- Center hub: Inner hexagon -->
  <polygon
    points="400,85 428,96 428,124 400,135 372,124 372,96"
    fill="#0d1117"
    stroke="none"
    opacity="0.07"
  />
  <polygon
    points="400,85 428,96 428,124 400,135 372,124 372,96"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.2"
    opacity="0.7"
  />

  <!-- Circuit pin stubs on each hexagon edge -->
  <!-- Top pin -->
  <line x1="400" y1="70" x2="400" y2="58" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="56" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <!-- Top-right pin -->
  <line x1="448" y1="87" x2="460" y2="80" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="462" cy="79" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <!-- Bottom-right pin -->
  <line x1="448" y1="133" x2="460" y2="140" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="462" cy="141" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <!-- Bottom pin -->
  <line x1="400" y1="150" x2="400" y2="162" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="164" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <!-- Bottom-left pin -->
  <line x1="352" y1="133" x2="340" y2="140" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="338" cy="141" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <!-- Top-left pin -->
  <line x1="352" y1="87" x2="340" y2="80" stroke="#0d1117" stroke-width="1.5" opacity="0.6"/>
  <circle cx="338" cy="79" r="2.5" fill="none" stroke="#0d1117" stroke-width="1" opacity="0.5"/>

  <!-- Small "D" label in center of hub -->
  <text x="400" y="116" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#0d1117" opacity="0.5">D</text>

  <!-- ============================================ -->
  <!-- PCB TRACES — LEFT SIDE (to services)         -->
  <!-- ============================================ -->

  <!-- Trace: Hub left-pin → horizontal run → split to JIRA (upper) and Bitbucket (lower) -->
  <!-- Main trunk: from hub left face going left -->
  <polyline
    points="352,110 310,110 280,110"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.8"
    opacity="0.5"
  />
  <!-- Branch up to JIRA node -->
  <polyline
    points="280,110 260,110 240,90 180,90"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.5"
    opacity="0.45"
  />
  <!-- Branch down to Bitbucket node -->
  <polyline
    points="280,110 260,110 240,130 180,130"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.5"
    opacity="0.45"
  />

  <!-- Secondary traces (decorative parallel runs) -->
  <polyline
    points="352,105 316,105 286,105"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.5"
    opacity="0.2"
  />
  <polyline
    points="352,115 316,115 286,115"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.5"
    opacity="0.2"
  />

  <!-- Via holes on left traces -->
  <circle cx="280" cy="110" r="3.5" fill="none" stroke="#0d1117" stroke-width="0.8" opacity="0.35"/>
  <circle cx="280" cy="110" r="1.5" fill="#0d1117" opacity="0.25"/>
  <circle cx="240" cy="90" r="2.5" fill="none" stroke="#0d1117" stroke-width="0.6" opacity="0.3"/>
  <circle cx="240" cy="130" r="2.5" fill="none" stroke="#0d1117" stroke-width="0.6" opacity="0.3"/>

  <!-- ============================================ -->
  <!-- JIRA NODE (kanban board icon)                -->
  <!-- ============================================ -->
  <!-- Container rectangle -->
  <rect x="110" y="68" width="66" height="46" rx="4" fill="none" stroke="#0d1117" stroke-width="1.5" opacity="0.7"/>
  <!-- Label -->
  <text x="143" y="63" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#0d1117" opacity="0.45">JIRA</text>
  <!-- Kanban card grid: 2 columns x 3 rows of tiny rectangles -->
  <!-- Column 1 -->
  <rect x="118" y="75" width="12" height="7" rx="1" fill="#0d1117" opacity="0.15"/>
  <rect x="118" y="86" width="12" height="7" rx="1" fill="#0d1117" opacity="0.25"/>
  <rect x="118" y="97" width="12" height="7" rx="1" fill="#0d1117" opacity="0.1"/>
  <!-- Column 2 -->
  <rect x="136" y="75" width="12" height="7" rx="1" fill="#0d1117" opacity="0.2"/>
  <rect x="136" y="86" width="12" height="7" rx="1" fill="#0d1117" opacity="0.1"/>
  <rect x="136" y="97" width="12" height="7" rx="1" fill="#0d1117" opacity="0.3"/>
  <!-- Column 3 -->
  <rect x="154" y="75" width="12" height="7" rx="1" fill="#0d1117" opacity="0.12"/>
  <rect x="154" y="86" width="12" height="7" rx="1" fill="#0d1117" opacity="0.18"/>
  <!-- Column dividers -->
  <line x1="134" y1="72" x2="134" y2="110" stroke="#0d1117" stroke-width="0.4" opacity="0.2"/>
  <line x1="152" y1="72" x2="152" y2="110" stroke="#0d1117" stroke-width="0.4" opacity="0.2"/>

  <!-- Connection stub: JIRA to trace -->
  <line x1="176" y1="90" x2="180" y2="90" stroke="#0d1117" stroke-width="1.5" opacity="0.45"/>

  <!-- ============================================ -->
  <!-- BITBUCKET NODE (git branch icon)             -->
  <!-- ============================================ -->
  <!-- Container circle -->
  <circle cx="143" cy="152" r="28" fill="none" stroke="#0d1117" stroke-width="1.5" opacity="0.7"/>
  <!-- Label -->
  <text x="143" y="130" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8" fill="#0d1117" opacity="0.45">GIT</text>
  <!-- Git branch lines: trunk + fork -->
  <line x1="137" y1="138" x2="137" y2="168" stroke="#0d1117" stroke-width="1.5" opacity="0.55"/>
  <circle cx="137" cy="138" r="2.5" fill="#0d1117" opacity="0.4"/>
  <circle cx="137" cy="168" r="2.5" fill="#0d1117" opacity="0.4"/>
  <!-- Branch fork -->
  <line x1="137" y1="148" x2="145" y2="143" stroke="#0d1117" stroke-width="1.2" opacity="0.45"/>
  <line x1="145" y1="143" x2="155" y2="143" stroke="#0d1117" stroke-width="1.2" opacity="0.45"/>
  <circle cx="155" cy="143" r="2.5" fill="#0d1117" opacity="0.4"/>
  <!-- Second branch -->
  <line x1="137" y1="158" x2="148" y2="162" stroke="#0d1117" stroke-width="1" opacity="0.35"/>
  <line x1="148" y1="162" x2="155" y2="162" stroke="#0d1117" stroke-width="1" opacity="0.35"/>
  <circle cx="155" cy="162" r="2" fill="#0d1117" opacity="0.3"/>

  <!-- Connection stub: Bitbucket to trace -->
  <line x1="171" y1="147" x2="180" y2="130" stroke="#0d1117" stroke-width="1.2" opacity="0.4"/>

  <!-- ============================================ -->
  <!-- PCB TRACES — RIGHT SIDE (to agents)          -->
  <!-- ============================================ -->

  <!-- Main trunk from hub right face -->
  <polyline
    points="448,110 490,110 520,110"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.8"
    opacity="0.5"
  />

  <!-- Branch to top agent -->
  <polyline
    points="520,110 540,110 560,80 620,80"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.2"
    opacity="0.4"
  />
  <!-- Branch to middle agent -->
  <polyline
    points="520,110 580,110 620,110"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.2"
    opacity="0.4"
  />
  <!-- Branch to bottom agent -->
  <polyline
    points="520,110 540,110 560,140 620,140"
    fill="none"
    stroke="#0d1117"
    stroke-width="1.2"
    opacity="0.4"
  />

  <!-- Secondary decorative parallel traces -->
  <polyline
    points="448,105 496,105 526,105"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.5"
    opacity="0.2"
  />
  <polyline
    points="448,115 496,115 526,115"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.5"
    opacity="0.2"
  />

  <!-- Via hole on right trunk -->
  <circle cx="520" cy="110" r="3.5" fill="none" stroke="#0d1117" stroke-width="0.8" opacity="0.35"/>
  <circle cx="520" cy="110" r="1.5" fill="#0d1117" opacity="0.25"/>
  <circle cx="560" cy="80" r="2.5" fill="none" stroke="#0d1117" stroke-width="0.6" opacity="0.3"/>
  <circle cx="560" cy="140" r="2.5" fill="none" stroke="#0d1117" stroke-width="0.6" opacity="0.3"/>

  <!-- ============================================ -->
  <!-- AGENT NODES (3 circles with antennas)        -->
  <!-- ============================================ -->

  <!-- Agent 1 (top) -->
  <circle cx="640" cy="80" r="14" fill="none" stroke="#0d1117" stroke-width="1.3" opacity="0.6"/>
  <circle cx="640" cy="80" r="6" fill="#0d1117" opacity="0.08"/>
  <!-- Antenna -->
  <line x1="640" y1="66" x2="640" y2="56" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <circle cx="640" cy="54" r="2" fill="#0d1117" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="635" cy="78" r="1.5" fill="#0d1117" opacity="0.35"/>
  <circle cx="645" cy="78" r="1.5" fill="#0d1117" opacity="0.35"/>
  <!-- Label -->
  <text x="640" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="7" fill="#0d1117" opacity="0.35">A-01</text>

  <!-- Agent 2 (middle) -->
  <circle cx="648" cy="110" r="14" fill="none" stroke="#0d1117" stroke-width="1.3" opacity="0.6"/>
  <circle cx="648" cy="110" r="6" fill="#0d1117" opacity="0.08"/>
  <!-- Antenna -->
  <line x1="648" y1="96" x2="648" y2="86" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <circle cx="648" cy="84" r="2" fill="#0d1117" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="643" cy="108" r="1.5" fill="#0d1117" opacity="0.35"/>
  <circle cx="653" cy="108" r="1.5" fill="#0d1117" opacity="0.35"/>
  <!-- Label -->
  <text x="648" y="130" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="7" fill="#0d1117" opacity="0.35">A-02</text>

  <!-- Agent 3 (bottom) -->
  <circle cx="640" cy="140" r="14" fill="none" stroke="#0d1117" stroke-width="1.3" opacity="0.6"/>
  <circle cx="640" cy="140" r="6" fill="#0d1117" opacity="0.08"/>
  <!-- Antenna -->
  <line x1="640" y1="126" x2="640" y2="116" stroke="#0d1117" stroke-width="1" opacity="0.5"/>
  <circle cx="640" cy="114" r="2" fill="#0d1117" opacity="0.4"/>
  <!-- Eyes -->
  <circle cx="635" cy="138" r="1.5" fill="#0d1117" opacity="0.35"/>
  <circle cx="645" cy="138" r="1.5" fill="#0d1117" opacity="0.35"/>
  <!-- Label -->
  <text x="640" y="160" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="7" fill="#0d1117" opacity="0.35">A-03</text>

  <!-- ============================================ -->
  <!-- DATA PACKETS (tiny squares along traces)     -->
  <!-- ============================================ -->

  <!-- Packet 1: on left trunk, active (green) -->
  <rect x="295" y="108" width="3" height="3" fill="#2ea043" opacity="0.85"/>
  <!-- Packet 2: on left upper branch -->
  <rect x="215" y="88" width="3" height="3" fill="#0d1117" opacity="0.45"/>
  <!-- Packet 3: on right trunk, active (green) -->
  <rect x="500" y="108" width="3" height="3" fill="#2ea043" opacity="0.8"/>
  <!-- Packet 4: on right upper branch -->
  <rect x="590" y="78" width="3" height="3" fill="#0d1117" opacity="0.4"/>
  <!-- Packet 5: on right lower branch, active (green) -->
  <rect x="585" y="138" width="3" height="3" fill="#2ea043" opacity="0.75"/>

  <!-- ============================================ -->
  <!-- DECORATIVE ELEMENTS                          -->
  <!-- ============================================ -->

  <!-- Faint additional traces (ambient PCB feel) -->
  <!-- Top decorative trace -->
  <polyline
    points="400,58 400,40 430,40 430,50"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.4"
    opacity="0.12"
  />
  <polyline
    points="400,58 400,40 370,40 370,50"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.4"
    opacity="0.12"
  />
  <!-- Bottom decorative trace -->
  <polyline
    points="400,164 400,182 430,182 430,172"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.4"
    opacity="0.12"
  />
  <polyline
    points="400,164 400,182 370,182 370,172"
    fill="none"
    stroke="#0d1117"
    stroke-width="0.4"
    opacity="0.12"
  />

  <!-- Faint component pads / test points -->
  <rect x="425" y="37" width="8" height="8" rx="1" fill="none" stroke="#0d1117" stroke-width="0.4" opacity="0.1"/>
  <rect x="365" y="37" width="8" height="8" rx="1" fill="none" stroke="#0d1117" stroke-width="0.4" opacity="0.1"/>
  <rect x="425" y="175" width="8" height="8" rx="1" fill="none" stroke="#0d1117" stroke-width="0.4" opacity="0.1"/>
  <rect x="365" y="175" width="8" height="8" rx="1" fill="none" stroke="#0d1117" stroke-width="0.4" opacity="0.1"/>

  <!-- Tiny status LED near hub (green) -->
  <circle cx="462" cy="79" r="1.5" fill="#2ea043" opacity="0.6"/>

  <!-- Additional faint horizontal traces spanning width -->
  <line x1="70" y1="200" x2="730" y2="200" stroke="#0d1117" stroke-width="0.3" opacity="0.06"/>
  <line x1="70" y1="210" x2="730" y2="210" stroke="#0d1117" stroke-width="0.3" opacity="0.04"/>
  <line x1="70" y1="220" x2="730" y2="220" stroke="#0d1117" stroke-width="0.3" opacity="0.06"/>

  <!-- Corner registration marks -->
  <line x1="30" y1="20" x2="50" y2="20" stroke="#0d1117" stroke-width="0.5" opacity="0.1"/>
  <line x1="30" y1="20" x2="30" y2="40" stroke="#0d1117" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="20" x2="770" y2="20" stroke="#0d1117" stroke-width="0.5" opacity="0.1"/>
  <line x1="770" y1="20" x2="770" y2="40" stroke="#0d1117" stroke-width="0.5" opacity="0.1"/>

  <!-- ============================================ -->
  <!-- BOTTOM TEXT                                  -->
  <!-- ============================================ -->

  <!-- Title -->
  <text x="400" y="268" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="10" fill="#0d1117">DEVDOCK</text>

  <!-- Tagline -->
  <text x="400" y="292" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2" fill="#0d1117" opacity="0.55">jira · bitbucket · pr review · ssh git ops · zod-validated</text>

  <!-- Ground line -->
  <rect x="40" y="306" width="720" height="3" rx="1.5" fill="#0d1117"/>

</svg>